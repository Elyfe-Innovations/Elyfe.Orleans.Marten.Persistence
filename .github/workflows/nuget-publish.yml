name: Build and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  test:
    name: Test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore Elyfe.Orleans.Marten.Persistence.slnx

      - name: Build
        run: dotnet build --configuration Release --no-restore Elyfe.Orleans.Marten.Persistence.slnx

      - name: Test
        run: dotnet test --configuration Release --no-build Elyfe.Orleans.Marten.Persistence.slnx --logger trx --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: .NET Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx

  build:
    name: Build and Pack
    if: github.event_name == 'pull_request' || (github.event_name == 'release' && github.event.action == 'published')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      nuget_version: ${{ steps.gitversion.outputs.nuGetVersionV2 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for GitVersion to work correctly

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: "5.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.7.0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore Elyfe.Orleans.Marten.Persistence.slnx

      - name: Build
        run: dotnet build --configuration Release --no-restore Elyfe.Orleans.Marten.Persistence.slnx

      - name: Pack Projects
        run: |
          dotnet pack src/Elyfe.Orleans.Marten.Persistence/Elyfe.Orleans.Marten.Persistence.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}
          dotnet pack src/Elyfe.Analyzers.Orleans.MartenSchema/Elyfe.Analyzers.Orleans.MartenSchema.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: ./nupkgs/*.nupkg

  publish:
    name: Publish to NuGet
    needs: build
    permissions:
      id-token: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment:
      name: nuget
      url: https://www.nuget.org/packages/Elyfe.Orleans.Marten.Persistence/${{ needs.build.outputs.nuget_version }}
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: ./nupkgs
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      # Setup dotnet runtime
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x
      #Push using Short Lived Tokem
      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source "https://api.nuget.org/v3/index.json"
