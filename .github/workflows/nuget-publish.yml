name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Pack
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      nuget_version: ${{ steps.gitversion.outputs.nuGetVersionV2 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for GitVersion to work correctly

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.0'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Elyfe.Orleans.Marten.Persistence.slnx

      - name: Build
        run: dotnet build --configuration Release --no-restore Elyfe.Orleans.Marten.Persistence.slnx

#      - name: Test
#        run: dotnet test --configuration Release --no-build Elyfe.Orleans.Marten.Persistence.slnx

      - name: Pack Projects
        run: |
          dotnet pack src/Elyfe.Orleans.Marten.Persistence/Elyfe.Orleans.Marten.Persistence.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}
          dotnet pack src/Elyfe.Analyzers.Orleans.MartenSchema/Elyfe.Analyzers.Orleans.MartenSchema.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}
          dotnet pack src/Elyfe.Orleans.Marten.Reminders/Elyfe.Orleans.Marten.Reminders.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersionV2 }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: ./nupkgs/*.nupkg  

  publish:
    name: Publish to NuGet
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment:
      name: nuget
      url: https://www.nuget.org/packages/Elyfe.Orleans.Marten.Persistence/${{ needs.build.outputs.nuget_version }}
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: ./nupkgs
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json"
